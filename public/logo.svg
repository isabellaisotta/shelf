<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Book leaning like / against the S -->
  <g transform="translate(14, 2)">
    <g transform="rotate(15, 10, 28)">
      <!-- Book cover (front) -->
      <rect x="0" y="0" width="16" height="52" rx="2" fill="#FF6B6B"/>
      <!-- Page block (visible edge) -->
      <rect x="16" y="3" width="4" height="46" rx="1" fill="#e0d6cc"/>
      <!-- Back cover sliver -->
      <rect x="20" y="1" width="2" height="50" rx="0.5" fill="#e05555"/>
      <!-- Spine detail lines on front cover -->
      <line x1="4" y1="8" x2="12" y2="8" stroke="#FF8E8E" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4" y1="11" x2="10" y2="11" stroke="#FF8E8E" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="4" y1="42" x2="12" y2="42" stroke="#FF8E8E" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>
  <!-- "Shelf" text - all white -->
  <text x="52" y="44" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="#f5f5f5">Shelf</text>
</svg>
